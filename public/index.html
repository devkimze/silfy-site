<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>@Jihoo</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  background: #0a0a0a;
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: #fff;
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: none !important;
}

*,
*::before,
*::after {
  cursor: none !important;
}
  
#cursorGlow {
  position: fixed;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;

  background: rgba(255,255,255,0.9);

  box-shadow:
    0 0 8px rgba(255,255,255,0.9),
    0 0 16px rgba(255,255,255,0.6),
    0 0 24px rgba(255,255,255,0.4);

  transform: translate(-50%, -50%);
}
  
.cursor {
  opacity: 0;
  transition: opacity 0.2s;
}
  
.layout {
  transform: scale(0.9);
  transform-origin: center;
  width: 1100px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px 64px;
}

.left-col, .right-col {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* glass */
.liquid-glass {
  position: relative;
  background: rgba(20, 20, 20, 0.35);
  backdrop-filter: blur(22px) saturate(140%);
  border-radius: 22px;
  border: 1px solid rgba(255,255,255,0.14);
  overflow: hidden;
}

.liquid-glass::after {
  display: none;
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(80px circle at var(--mx) var(--my), rgba(255,255,255,0.12), transparent 55%);
  opacity: 0;
  transition: 0.25s;
  pointer-events: none;
}

.liquid-glass:hover::after {
  opacity: 1;
}

.header-box {
  padding: 26px 28px;
}

.username {
  font-size: 24px;
  font-weight: 700;
  position: relative;
  display: inline-block;
}

.name-particle {
  position: fixed;

  width: 2px;
  height: 4px;

  background: rgba(255,255,255,0.9);

  box-shadow:
    0 0 6px rgba(255,255,255,0.9),
    0 0 12px rgba(255,255,255,0.6);

  pointer-events: none;
  z-index: 5;

  animation: nameParticleFade 0.6s linear forwards;
}

@keyframes nameParticleFade {
  to {
    transform: translateY(-6px);
    opacity: 0;
  }
}

@media (hover: none) and (pointer: coarse) {
  #cursorGlow {
    display: none;
  }
}

.sparkle {
  position: relative;
  color: #fff;
}

@keyframes shake {
  0% { transform: translate(0, 0); }
  20% { transform: translate(-1px, 1px); }
  40% { transform: translate(1px, -1px); }
  60% { transform: translate(-1px, 0); }
  80% { transform: translate(1px, 1px); }
  100% { transform: translate(0, 0); }
}


.bio {
  font-size: 15px;
  color: rgba(255,255,255,0.7);
  margin-top: 10px;
}

.social-inline {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

.icon-btn {
  position: relative;
  width: 34px;
  height: 34px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: 0.2s;
}

.icon-btn:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.1);
}

.icon-btn img {
  width: 18px;
  filter: invert(1);
}

.mail-tooltip {
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  color: #aaa;
  opacity: 0;
  transition: 0.2s;
}

.mail-btn:hover .mail-tooltip {
  opacity: 1;
}

/* Discord */
.social-item.discord {
  position: relative;
  display: flex;
  align-items: center;
  padding: 18px 22px;
  height: 96px;
  border-radius: 18px;
  background: #141414;
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
}

.discord-content {
  display: flex;
  align-items: center;
  gap: 14px;
  z-index: 2;
}

.discord-avatar {
  position: relative;
  width: 60px;
  height: 60px;
}

.discord-avatar img {
  width: 100%;
  border-radius: 50%;
}

.status-dot {
  position: absolute;
  bottom: -2px;
  right: -2px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 3px solid #141414;
}

.status-online { background: #23a55a; }
.status-idle { background: #f0b232; }
.status-dnd { background: #f23f43; }
.status-offline { background: #747f8d; }

/* 🔥 SETTINGS (완전히 수정됨) */
.settings-card {
  padding: 26px 28px;
}

.settings-card h2 {
  margin: 0 0 12px;
}

/* 핵심: grid로 정렬 */
.setting-row {
  display: grid;
  grid-template-columns: 130px 1fr;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

/* 왼쪽 라벨 */
.setting-row p {
  margin: 0;
  font-size: 14px;
  color: rgba(255,255,255,0.6);
}

/* 오른쪽 값 */
.setting-row span {
  text-align: right;
  font-size: 14px;
  color: rgba(255,255,255,0.9);
}

/* 마지막 줄 border 제거 */
.setting-row:last-child {
  border-bottom: none;
}

/* toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,20,20,0.9);
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 13px;
  border: 1px solid rgba(255,255,255,0.1);
  opacity: 0;
  transition: 0.3s;
}

.toast.show {
  opacity: 1;
}

.snowflake {
  position: fixed;
  top: -10px;
  color: white;
  font-size: 10px;
  opacity: 0.6;
  pointer-events: none;
  z-index: 0;

  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
    opacity: 0;
  }
}

.discord-banner {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0.65;
  border-radius: inherit;
}

.discord-info {
  display: flex;
  flex-direction: column;
}

#discordActivity {
  font-size: 13px;
  color: #bdbdbd;
  margin-top: 2px;
}

#discordName {
  font-size: 20px;
  font-weight: 700;
}

.album-art {
  position: absolute;
  right: 28px;
  top: 50%;
  transform: translateY(-50%);
  width: 56px;
  height: 56px;
  border-radius: 50%;
  animation: spin 6s linear infinite;
  z-index: 2;
}
  
.album-art.hidden {
  display: none;
}

.glow {
  color: #fff;
  text-shadow:
    0 0 6px rgba(255,255,255,0.6),
    0 0 12px rgba(255,255,255,0.4);
}

.particle {
  position: fixed;
  display: none;
  width: 6px;
  height: 6px;
  background: rgba(255,255,255,0.8);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;

  box-shadow:
    0 0 6px rgba(255,255,255,0.8),
    0 0 12px rgba(255,255,255,0.6);

  animation: particleFade 0.6s linear forwards;
}

#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 1.00; /* 감성 조절 */
  z-index: -1;
}

@keyframes particleFade {
  to {
    transform: translateY(-10px) scale(0.5);
    opacity: 0;
  }
}

@keyframes spin {
  from { transform: translateY(-50%) rotate(0deg); }
  to { transform: translateY(-50%) rotate(360deg); }
}

/* mobile */
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
}
</style>
</head>

<body>
<video autoplay muted loop playsinline id="bgVideo">
  <source src="img/bg.mp4" type="video/mp4">
</video>

<div id="cursorGlow"></div>

<div id="toast" class="toast">Email copied to clipboard.</div>

<div class="layout">
  
  <div class="left-col">

    <div class="header-box liquid-glass">
      <div class="username" id="name">Jihoo</div>
      <div class="bio">
        2.3k+ Discord Server founder<br>
        5K on TT<br>
        Edit & Code for fun.
      </div>

      <div class="social-inline">
        <a href="https://youtube.com/@silfyxd" target="_blank" class="icon-btn">
          <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg">
        </a>

        <a href="https://tiktok.com/@silfyxd" target="_blank" class="icon-btn">
          <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg">
        </a>

        <a href="https://github.com/devkimze" target="_blank" class="icon-btn">
          <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg">
        </a>

        <div class="icon-btn mail-btn" id="mailBtn">
          <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gmail.svg">
          <span class="mail-tooltip">me@silfy.dev</span>
        </div>
      </div>
    </div>

    <div class="social-item discord">
      <div class="discord-banner" id="discordBanner"></div>

      <div class="discord-content">
        <div class="discord-avatar">
          <img id="discordAvatar" src="img/dc.jpg">
          <div id="discordDot" class="status-dot status-offline"></div>
        </div>

        <div class="discord-info">
          <div id="discordName">@Loading...</div>
          <div id="discordActivity"></div>
        </div>
      </div>

      <img id="albumArt" class="album-art hidden">
    </div>

  </div>

  <div class="right-col">
    <div class="settings-card liquid-glass">
      <h2>Settings</h2>
      <div class="setting-row"><p>Mouse</p><span>Razer Viper V3 Pro</span></div>
      <div class="setting-row"><p>Mouse Pad</p><span>Artisan FX Zero Mid</span></div>
      <div class="setting-row"><p>Keyboard</p><span>Venom 88HE</span></div>
      <div class="setting-row"><p>Sensitivity</p><span>90~135cm/360 @ 800 dpi</span></div>
    </div>
  </div>

</div>

<script>
document.querySelectorAll('.liquid-glass').forEach(card => {
  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    card.style.setProperty('--mx', `${e.clientX - rect.left}px`);
    card.style.setProperty('--my', `${e.clientY - rect.top}px`);
  });
});

document.addEventListener("mouseleave", () => {
  cursor.style.opacity = "0";
});

const cursor = document.getElementById("cursorGlow");
let cursorVisible = false;

document.addEventListener("mousemove", (e) => {
  // 위치 이동
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";

  // 처음 움직일 때만 표시
  if (!cursorVisible) {
    cursor.style.opacity = "1";
    cursorVisible = true;
  }

  // 파티클
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = e.clientX + "px";
  p.style.top = e.clientY + "px";

  document.body.appendChild(p);
  setTimeout(() => p.remove(), 600);
});
const cursor = document.getElementById("cursorGlow");

document.querySelectorAll('a, .icon-btn').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.transform = "translate(-50%, -50%) scale(1.2)";
  });

  el.addEventListener('mouseleave', () => {
    cursor.style.transform = "translate(-50%, -50%) scale(1)";
  });
});

/* ===== Discord Presence ===== */
async function fetchDiscordPresence(){
  const res = await fetch(`/api/discord-status/1256264184996565135?_=${Date.now()}`);
  const data = await res.json();

  discordAvatar.src = data.avatar_url || discordAvatar.src;
  discordName.textContent = data.username ? `@${data.username}` : "@unknown";
  discordDot.className = `status-dot status-${data.status || "offline"}`;

  if (data.banner_url) {
    discordBanner.style.backgroundImage = `url(${data.banner_url})`;
  }

  if (data.activity?.name === "Spotify") {

    const artist = (data.activity.state || "").replace(/;/g, ",");

    discordActivity.innerHTML = `
      <span class="glow">Listening</span> to ${data.activity.details}<br>
      <span class="glow">by</span> ${artist}
    `;

    albumArt.src = data.activity.album_art_url;
    albumArt.classList.remove("hidden");

  } else if (data.activity?.name) {

    discordActivity.innerHTML = `
      <span class="glow">Playing</span> ${data.activity.name}
    `;

    albumArt.classList.add("hidden");

  } else {
    discordActivity.textContent = "";
    albumArt.classList.add("hidden");
  }
}

fetchDiscordPresence();
setInterval(fetchDiscordPresence, 30000);

const text = "@Jihoo";
let index = 1;
let forward = true;

setInterval(() => {
  const snow = document.createElement("div");
  snow.className = "snowflake";
  snow.innerHTML = "•";

  snow.style.left = Math.random() * window.innerWidth + "px";
  snow.style.animationDuration = (2 + Math.random() * 3) + "s";

  document.body.appendChild(snow);

  setTimeout(() => snow.remove(), 5000);
}, 120);

  const nameEl = document.getElementById("name");

setInterval(() => {
  const rect = nameEl.getBoundingClientRect();

  const p = document.createElement("div");
  p.className = "name-particle";

  // 텍스트 주변 랜덤 위치
  const x = rect.left + Math.random() * rect.width;
  const y = rect.top + Math.random() * rect.height;

  p.style.left = x + "px";
  p.style.top = y + "px";

  document.body.appendChild(p);

  setTimeout(() => p.remove(), 600);
}, 30);
  
setInterval(() => {
  document.title = text.slice(0, Math.max(1, Math.min(index, text.length)));

  if (forward) {
    index++;
    if (index > text.length + 2) forward = false;
  } else {
    index--;
    if (index < 1) forward = true;
  }
}, 400);
</script>

</body>
</html>
