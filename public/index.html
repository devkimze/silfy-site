<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jihoo</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  background: #0a0a0a;
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: #fff;
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.layout {
  transform: scale(0.9);
  transform-origin: center;
  width: 1100px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px 64px;
}

.left-col, .right-col {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* glass */
.liquid-glass {
  position: relative;
  background: rgba(20, 20, 20, 0.35);
  backdrop-filter: blur(22px) saturate(140%);
  border-radius: 22px;
  border: 1px solid rgba(255,255,255,0.14);
  overflow: hidden;
}

.liquid-glass::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(520px circle at var(--mx) var(--my), rgba(255,255,255,0.12), transparent 55%);
  opacity: 0;
  transition: 0.25s;
}

.liquid-glass:hover::after {
  opacity: 1;
}

.header-box {
  padding: 26px 28px;
}

.username {
  font-size: 24px;
  font-weight: 700;
}

.bio {
  font-size: 15px;
  color: rgba(255,255,255,0.7);
  margin-top: 10px;
}

.social-inline {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

.icon-btn {
  position: relative;
  width: 34px;
  height: 34px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: 0.2s;
}

.icon-btn:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.1);
}

.icon-btn img {
  width: 18px;
  filter: invert(1);
}

.mail-tooltip {
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  color: #aaa;
  opacity: 0;
  transition: 0.2s;
}

.mail-btn:hover .mail-tooltip {
  opacity: 1;
}

/* Discord */
.social-item.discord {
  position: relative;
  display: flex;
  align-items: center;
  padding: 18px 22px;
  height: 96px;
  border-radius: 18px;
  background: #141414;
  border: 1px solid rgba(255,255,255,0.1);
}

.discord-content {
  display: flex;
  align-items: center;
  gap: 14px;
}

.discord-avatar {
  position: relative;
  width: 60px;
  height: 60px;
}

.discord-avatar img {
  width: 100%;
  border-radius: 50%;
}

.status-dot {
  position: absolute;
  bottom: -2px;
  right: -2px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 3px solid #141414;
}

.status-online { background: #23a55a; }
.status-idle { background: #f0b232; }
.status-dnd { background: #f23f43; }
.status-offline { background: #747f8d; }

/* Settings */
.settings-card {
  padding: 26px;
}

.setting-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,20,20,0.9);
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 13px;
  border: 1px solid rgba(255,255,255,0.1);
  opacity: 0;
  transition: 0.3s;
}

.toast.show {
  opacity: 1;
}

/* mobile */
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div id="toast" class="toast">메일이 복사됨</div>

<div class="layout">

  <div class="left-col">
    <div class="header-box liquid-glass">
      <div class="username">Jihoo</div>
      <div class="bio">
        2.3k+ Discord Server founder<br>
        5K on TT<br>
        Edit & Code for fun.
      </div>

      <div class="social-inline">
        <a href="https://youtube.com/@silfyxd" target="_blank" class="icon-btn">
          <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg">
        </a>

        <a href="https://tiktok.com/@silfyxd" target="_blank" class="icon-btn">
          <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg">
        </a>

        <a href="https://github.com/devkimze" target="_blank" class="icon-btn">
          <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg">
        </a>

        <div class="icon-btn mail-btn" id="mailBtn">
          <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gmail.svg">
          <span class="mail-tooltip">me@silfy.dev</span>
        </div>
      </div>
    </div>

    <div class="social-item discord">
      <div class="discord-content">
        <div class="discord-avatar">
          <img id="discordAvatar" src="img/dc.jpg">
          <div id="discordDot" class="status-dot status-offline"></div>
        </div>
        <div>
          <div id="discordName">@Loading...</div>
          <div id="discordActivity"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="right-col">
    <div class="settings-card liquid-glass">
      <h2>Settings</h2>
      <div class="setting-row"><p>Mouse</p><span>Razer Viper V3 Pro</span></div>
      <div class="setting-row"><p>Mouse Pad</p><span>Artisan FX Zero Mid</span></div>
      <div class="setting-row"><p>Keyboard</p><span>Venom 88HE</span></div>
      <div class="setting-row"><p>Sensitivity</p><span>90~135cm/360 @ 800 dpi</span></div>
    </div>
  </div>

</div>

<script>
/* glow */
document.querySelectorAll('.liquid-glass').forEach(card => {
  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    card.style.setProperty('--mx', `${e.clientX - rect.left}px`);
    card.style.setProperty('--my', `${e.clientY - rect.top}px`);
  });
});

/* mail copy */
const mailBtn = document.getElementById("mailBtn");
const toast = document.getElementById("toast");

mailBtn.onclick = async () => {
  await navigator.clipboard.writeText("me@silfy.dev");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
};

/* discord */
async function fetchDiscordPresence(){
  const res = await fetch(`/api/discord-status/1256264184996565135`);
  const data = await res.json();

  discordAvatar.src = data.avatar_url || discordAvatar.src;
  discordName.textContent = data.username ? `@${data.username}` : "@unknown";
  discordDot.className = `status-dot status-${data.status || "offline"}`;
  discordActivity.textContent = data.activity?.name || "";
}

fetchDiscordPresence();
setInterval(fetchDiscordPresence, 30000);

/* title animation */
const text = "Jihoo";
let index = 1;
let forward = true;

setInterval(() => {
  document.title = text.slice(0, Math.max(1, Math.min(index, text.length)));

  if (forward) {
    index++;
    if (index > text.length + 2) forward = false;
  } else {
    index--;
    if (index < 1) forward = true;
  }
}, 400);
</script>

</body>
</html>
